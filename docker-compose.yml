services:
  app:
    container_name: medical-record-app
    build: .
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - WHISPER_URL=http://whisper:9000
      - WEB_PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      # Bun runs TypeScript directly, so the app needs no build step. Bind-mount
      # the source + built SPA so code deploys are a `restart` (seconds), not an
      # image rebuild. node_modules stays baked in the image (not mounted), so a
      # full `--build` is only needed when dependencies or the Dockerfile change.
      - ./src:/app/src
      - ./web/dist:/app/web/dist
    depends_on:
      qdrant:
        condition: service_healthy
      whisper:
        condition: service_started
    restart: unless-stopped

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: medical-record-whisper
    environment:
      - ASR_MODEL=small
      - ASR_ENGINE=faster_whisper
    volumes:
      - ./data/whisper-cache:/root/.cache/
    restart: unless-stopped

  qdrant:
    container_name: medical-record-qdrant
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      retries: 5
    restart: unless-stopped
