services:
  app:
    container_name: medical-record-app
    build: .
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - WHISPER_URL=http://whisper-service:9000
      - WEB_PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./web/dist:/app/web/dist
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - default
      - shared-services
    restart: unless-stopped

  qdrant:
    container_name: medical-record-qdrant
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      retries: 5
    restart: unless-stopped

networks:
  shared-services:
    external: true
